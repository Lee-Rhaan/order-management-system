<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - Order Management System</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px auto;
            max-width: 760px;
            background: #f8f9fa;
            color: #333;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        h1 {
            color: #b02a37;
            margin-top: 0;
        }

        pre {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            background: #0d6efd;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
        }

        a:hover {
            background: #0b5ed7;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Something went wrong</h1>
    <p th:text="${message}">Unexpected error occurred.</p>
    <pre th:if="${details}" th:text="${details}"></pre>
    <a href="/">Back to Home</a>
</div>
</body>
</html>
